<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Private template example — replace with your design</title>
  <style>
    :root { --brand: #3d2b3d; --bg: #f9f5f0; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: #1a1a1a; }
    header { padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    main { max-width: 72rem; margin: 0 auto; padding: 3rem 1.5rem; }
    h1 { font-size: clamp(2rem, 5vw, 3.5rem); margin: 0 0 1rem; }
    p.lead { font-size: 1.125rem; color: #555; max-width: 40ch; }
    .cta { display: inline-block; margin-top: 2rem; padding: 0.875rem 1.75rem; background: var(--brand); color: #fff; text-decoration: none; border-radius: 999px; }
  </style>
</head>
<body>
  <header>
    <span class="logo">Your Brand</span>
    <nav><a href="#shop">Shop</a></nav>
  </header>
  <main>
    <h1>Custom tenant storefront</h1>
    <p class="lead">
      Replace this file with your full HTML design. Register as <code>private-your-slug</code>
      and assign only the tenants who should see it.
    </p>
    <a class="cta" href="#shop">Shop now</a>
  </main>
</body>
</html>
